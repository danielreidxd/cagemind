name: CageMind Auto-Update

on:
  schedule:
    # Job 1: Upcoming events — cada 2 días a las 10:00 UTC (4:00 AM México)
    - cron: '0 10 */2 * *'
    # Job 2: Post-event — cada lunes a las 14:00 UTC (8:00 AM México)
    - cron: '0 14 * * 1'
  
  # Correr manualmente desde GitHub
  workflow_dispatch:
    inputs:
      mode:
        description: 'Qué ejecutar'
        required: true
        default: 'all'
        type: choice
        options:
          - upcoming
          - post-event
          - all

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml pandas numpy thefuzz python-Levenshtein
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%u)" = "1" ]; then
            # Es lunes → post-event (incluye upcoming también)
            echo "mode=all" >> $GITHUB_OUTPUT
          else
            # No es lunes → solo upcoming
            echo "mode=upcoming" >> $GITHUB_OUTPUT
          fi
      
      - name: Run update (upcoming only)
        if: steps.mode.outputs.mode == 'upcoming'
        run: python update_data.py --upcoming
      
      - name: Run update (post-event only)
        if: steps.mode.outputs.mode == 'post-event'
        run: python update_data.py --post-event
      
      - name: Run update (all)
        if: steps.mode.outputs.mode == 'all'
        run: python update_data.py --all
      
      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "🤖 Auto-update: $(date +'%Y-%m-%d %H:%M') UTC [${{ steps.mode.outputs.mode }}]"
            git push
            echo "✅ Cambios pusheados"
          else
            echo "📭 Sin cambios"
          fi
